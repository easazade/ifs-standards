schema: spec-driven

context: |
  Project: IFS Standards, a standards/specification site for the Individual Freedom System (IFS), a governance model where sovereignty stays with individuals and authority is delegated dynamically.
  Product focus: define schemas, protocols, and rules for dynamic consent, asset traceability, modular rule-setting, and transparent governance.
  Tech stack: JavaScript, React 19, Vite 8, React Router 7, Tailwind CSS v4 via @tailwindcss/vite, GSAP via @gsap/react.
  Architecture: client-side React app with BrowserRouter in src/main.jsx, route map in src/App.jsx and src/routes.js, shared shell in src/layouts/MainLayout.jsx, and current protocol content in static data under src/data/protocols.js.
  Design system: design/design-system.lib.pen is shared source of truth for Pencil components and tokens; all design/*.pen files should import it.
  Styling conventions: preserve existing editorial/minimal visual language, use defined design tokens and Tailwind inline classes, avoid hardcoded colors, use HEX in design files, and regenerate CSS tokens with npm run tokens:code when Pencil tokens change.
  Engineering conventions: prefer small focused changes, keep existing patterns unless there is a clear need, and do not add backward-compatibility code unless persisted behavior or external consumers require it.
  Validation: no automated test suite is configured yet; default verification is npm run lint and npm run build, plus manual route/UI checks when behavior changes.

rules:
  proposal:
    - State problem, intended outcome, and why change matters to the IFS standards site or standards authoring workflow.
    - Identify affected areas explicitly, such as routing, shared layout, static protocol content, design tokens, or specs/design assets.
    - Call out non-goals, migration or rollback concerns, and any risk to shared UI or future standards content.
  specs:
    - Name specs after **domain-level concerns** (e.g., `ui-layout`, `auth`, `protocols`), not after features or components (e.g., `sidebar-alignment`, `navbar-theme`). Multiple changes contribute requirements to the same spec over time. Ask what area of the system does this affect? not what am I building?
    - Write concrete, testable requirements using normative language such as MUST or SHOULD where appropriate.
    - Use scenario-oriented behavior descriptions; Given/When/Then is preferred for user-visible or workflow behavior.
    - Distinguish content requirements, UI requirements, and implementation constraints instead of mixing them into a single vague section.
    - Reference existing repo conventions before introducing new structures, file locations, or abstractions.
  design:
    - Ground the design in current repo structure and name the files, routes, components, or design assets that should change.
    - For UI work, document desktop and mobile behavior, token usage, and how the change fits DESIGN.md and the shared Pencil design system.
    - If design tokens or .pen assets change, mention downstream code sync needs such as npm run tokens:code.
  tasks:
    - Break work into small sequential tasks that map to concrete files or artifacts and are feasible in one focused session each.
    - Include verification tasks using npm run lint and npm run build whenever code changes are in scope.
    - Add manual verification steps for route, layout, animation, or styling changes because no automated UI tests exist yet.
    - Include follow-up artifact updates when implementation may require changes to specs, design docs, or Pencil assets.
